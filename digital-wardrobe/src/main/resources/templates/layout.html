<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DEMURE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* DESIGNERS: Edit these semantic classes to change the look */
        .app-header { @apply bg-white border-b p-6 flex justify-between items-center; }
        .wardrobe-grid { @apply grid grid-cols-2 md:grid-cols-4 gap-6 p-6; }
        .clothing-card { @apply bg-white rounded-xl shadow-sm border p-4 transition-all hover:shadow-lg; }
        .btn-primary { @apply bg-indigo-600 text-white px-6 py-2 rounded-lg font-medium; }
    </style>
</head>
<body class="bg-gray-50">
<header class="app-header">
    <h1 class="text-xl font-bold text-indigo-600">DEMURE</h1>
    <button class="btn-primary" onclick="document.getElementById('uploadModal').showModal()">+ Add Item</button>
</header>

<main th:replace="${content}"></main>
</body>
</html>
